    <script id='app-template' type='text/template'>
      <div id='my-projects'></div>
    </script>
    <script id='project-list-template' type='text/template'>
      <ul class='project-link'>
        <li>
          <img alt='{{title}}' src='{{imageThumb}}'>
        </li>
        <li>
          <h2>{{ title }}</h2>
          <h3>{{ summary }}</h3>
        </li>
      </ul>
    </script>
    <script id='project-template' type='text/template'>
      <div id='project'>
        <img alt='{{ title }}' src='{{imageLarge}}'>
        <div class='info'>
          <h2>
            <a href='{{ link }}'>{{ title }}</a>
          </h2>
          <h3>{{ summary }}</h3>
          <p>{{{ detail }}}</p>
          <h3>Built with:</h3>
          <ul class='built-with'>
            {{#each builtWith }}
            <li>{{ this }}</li>
            {{/each }}
          </ul>
          {{#if collaborators}}
          <h3>Team:</h3>
          <ul>
            {{#each collaborators }}
            <li>
              <a href='{{link}}'>{{ name }}</a>
            </li>
            {{/each }}
          </ul>
          {{/if}}
          {{#if images}}
          <ul class='more-images'>
            {{#each images }}
            <li>
              <img src="/images/{{this}}" />
            </li>
            {{/each }}
          </ul>
          {{/if}}
        </div>
      </div>
    </script>
    <script id='bio-template' type='text/template'>
      <div id='bio'>
        <h2>I'm Larlyn Tanasap! I'm a full stack developer.</h2>
        <p>
          I love problem solving and building things - I code, draw, design, make costumes, do photography, among other things. After attending a few Arduino workshops, I now have a keen interesting in programming hardware!
        </p>
        <p>
          I'm currently into making single page web apps with JavaScript MVCs and PhoneGap.
        </p>
        <p>
          I studied Web Development Immersive at General Assembly Sydney in 2014 and Graphic Design at Design Centre Enmore ending in 2012.
        </p>
        <p>
          In 2013, I worked in Walt Disney World in Orlando, Florida as a Character performer.
        </p>
        <h3>Skillset:</h3>
        <ul id='skills-list'>
          <li><a href="http://rubyonrails.org/">Ruby on Rails</a></li>
          <li><a href="https://developer.mozilla.org/en/docs/Web/JavaScript">Javascript</a></li>
          <li><a href="http://coffeescript.org">Coffeescript</a></li>
          <li><a href="http://www.w3.org/TR/html5/">HTML5/CSS3</a></li>
          <li><a href="http://haml.info/">HAML</a></li>
          <li><a href="http://sass-lang.com/">Sass</a></li>
          <li><a href="http://backbonejs.org/">Backbonejs</a></li>
          <li><a href="http://getbootstrap.com/">Twitter Bootstrap</a></li>
          <li><a href="http://phonegap.com/">PhoneGap</a></li>
          <li>..And always learning more!</li>
        </ul>
      </div>
    </script>
