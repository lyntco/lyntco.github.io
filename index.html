    <script id='app-template' type='text/template'>
      <div id='my-projects'>
        <h1>PROJECTS</h1>
      </div>
    </script>
    <script id='project-list-template' type='text/template'>
      <ul class='project-link'>
        <li>
          <img alt='' src='http://placehold.it/300x200'>
        </li>
        <li>
          <h3>{{ title }}</h3>
        </li>
      </ul>
    </script>
    <script id='project-template' type='text/template'>
      <div id='project'>
        <img alt='{{ title }}' src='http://placehold.it/200x400'>
        <div class='info'>
          <h2>{{ title }}</h2>
          <h3>
            <a href='{{ link }}'>{{ link }}</a>
            <p>{{ summary }}</p>
            <p>{{ detail }}</p>
            <h3>Built with:</h3>
            <ul class='built-with'>
              {{#each builtWith }}
              <li>{{ this }}</li>
              {{/each }}
            </ul>
          </h3>
        </div>
      </div>
    </script>

    </script>
