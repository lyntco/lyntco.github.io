<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'>
      <title>LYNTCO - Larlyn Tanasap</title>
      <link href="/stylesheets/all.css" rel="stylesheet" type="text/css" media="all" />
      <script src="/javascripts/all.js" type="text/javascript"></script>
    </meta>
  </head>
  <body>
    <nav>
      <ul>
        <li>
          <a class='navlink' href='#projects'>Projects</a>
        </li>
        <li>
          <a class='navlink' href='#bio'>Bio</a>
        </li>
        <li>
          <a class='navlink' href='#contact'>Contact</a>
        </li>
      </ul>
    </nav>
    <h1>LYNTCO</h1>
    <div id='main'>
      <h1>404</h1>
      <h3>Whoops. Looks like what you're looking for can't be found.</h3>
    </div>
    <script id='app-template' type='text/template'>
      <div id='my-projects'>
        <h1>PROJECTS</h1>
      </div>
    </script>
    <script id='project-list-template' type='text/template'>
      <ul class='project-link'>
        <li>
          <img alt='' src='http://placehold.it/300x200'>
        </li>
        <li>
          <h3>{{ title }}</h3>
        </li>
      </ul>
    </script>
    <script id='project-template' type='text/template'>
      <div id='project'>
        <h2>{{ title }}</h2>
        <h3>
          <a href='{{ link }}'>{{ link }}</a>
        </h3>
        <img alt='{{ title }}' src='{{ imageLarge }}'>
          <p>{{ summary }}</p>
          <p>{{ detail }}</p>
          <ul>{{ builtWith }}</ul>
          <ul>{{ collaborators }}</ul>
        </img>
      </div>
    </script>
    <script id='bio-template' type='text/template'>
      <div id='bio'>
        <h2>About me</h2>
        <p>
          I'm Larlyn Tanasap. I'm a full stack developer.
        </p>
        <p>
          Studied Web Development Immersive at General Assembly Sydney and Graphic Design at Design Centre Enmore.
        </p>
        <h3>Skills:</h3>
        <ul id='skills-list'>
          <li>Ruby on Rails</li>
          <li>Coffeescript</li>
          <li>SASS</li>
          <li>Backbonejs</li>
        </ul>
      </div>
    </script>
    <script id='contact-template' type='text/template'>
      <div id='contact'>
        <h2>Contact me!</h2>
        <p>You can find me at the following places:</p>
        <ul id='contact-list'>
          <li>
            <a href='http://github.com/lyntco'>Github</a>
          </li>
          <li>
            <a href='http://blog.lynt.co'>Blog</a>
          </li>
          <li>
            <a href='http://twitter.com/strawz'>Twitter</a>
          </li>
        </ul>
        <h3>Want to grab a coffee?</h3>
        <p>You can reach me at</p>
        <p>0432 871 070</p>
        <p>or</p>
        <p>strawww@gmail.com!</p>
      </div>
    </script>
  </body>
</html>
